name: ML Preprocessing Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn numpy

      - name: Run script
        run: python automate-Adinda-Intan-Erlita.py

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: cleaned-data
          path: reviews_cleaned.csv
